# ─────────────────────────────────────────────────────────────────────────────────────────────────
# PR pipeline (RFC §8) — PLACEHOLDER / STUB. Migration step 1 only wires the shape; the real jobs
# (cross-compile + binary-shaped validation) land in step 2/3.
#
# Intended shape (RFC §8):
#   grep-gate (binary-repo standing directives, CI-enforced):
#       - no committed binaries (*.a/*.so/*.dylib/tarballs)
#       - exactly ONE `boringssl` 40-hex commit literal in the tree (the single-pin directive)
#       - no `BORINGSSL_PREFIX` unless catalog-flagged (one-unprefixed-copy invariant)
#     → build-linux  +  build-android  (+ build-apple, DISABLED until step 7 — authored on macOS)
#     → validate-artifacts  (binary-shaped, RFC §8: tarball extracts; required headers present;
#         nm/llvm-nm shows required symbols UNPREFIXED and exactly one libcrypto; a throwaway
#         wrapper-.def compile+link per K/N triple; FFM SymbolLookup resolves on JVM; AAR prefab
#         metadata well-formed; a quiche ffi,qlog link-smoke against the linux tarball; per-ABI size
#         recorded vs the §5 ≤2.5 MB budget)
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Review (Build & Validate)"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grep-gate:
    name: "Standing directives (grep-gate)"
    runs-on: ubuntu-24.04
    outputs:
      # The D8 content-addressed-variant flag, read ONCE from the catalog so downstream jobs (the
      # coexistence gate) can condition on it without a checkout of their own.
      prefix_enabled: ${{ steps.d8-flag.outputs.enabled }}
    steps:
      - uses: actions/checkout@v6
      - name: "Read the D8 content-addressed-variant flag (boringsslPrefix)"
        id: d8-flag
        run: |
          if grep -qE '^boringsslPrefix = "true"' gradle/libs.versions.toml; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      # Binary-repo standing directives (RFC §8), CI-enforced.
      - name: "No committed native binaries"
        run: |
          if git ls-files | grep -E '\.(a|so|dylib|dll)$|\.tar\.gz$' ; then
            echo "::error::committed native binaries found — they must be gitignored and built in CI"
            exit 1
          fi
      - name: "BoringSSL commit literals (single-pin, or +1 content-addressed variant when flagged)"
        run: |
          n=$(git grep -hoE '[0-9a-f]{40}' -- gradle/libs.versions.toml | sort -u | wc -l)
          # The canonical `boringssl` pin is the ONE literal by default. A SECOND distinct pin is allowed
          # only when the content-addressed-variant flag is on (D8): boringsslVariantCommit is then a
          # sanctioned, prefix-isolated coexisting commit — not accidental drift.
          max=1
          if grep -qE '^boringsslPrefix = "true"' gradle/libs.versions.toml; then max=2; fi
          if [ "$n" -lt 1 ] || [ "$n" -gt "$max" ]; then
            echo "::error::expected 1 boringssl commit literal (or up to $max with boringsslPrefix=true), found $n"
            exit 1
          fi
      - name: "No BORINGSSL_PREFIX unless catalog-flagged (one-unprefixed-copy invariant)"
        # spikes/** are throwaway experiments (like docs + .github), NOT the production build path —
        # the D8 alias-shim spike legitimately builds a prefixed libcrypto to prove the mechanism.
        run: |
          if git grep -nE 'BORINGSSL_PREFIX' -- ':!*.md' ':!.github/**' ':!spikes/**' && ! grep -q 'boringsslPrefix' gradle/libs.versions.toml ; then
            echo "::error::BORINGSSL_PREFIX used without the catalog flag"
            exit 1
          fi

  # Real reusable lane — native-runner matrix, manylinux2014 container, glibc-floor gate, caching.
  build-linux:
    needs: [grep-gate]
    uses: ./.github/workflows/build-linux.yaml

  # REAL (step 7): per-SDK cmake cross-compile of all 10 Apple triples on macОS runners, each with a
  # per-SDK link-smoke, plus FFM (macOS x64+arm64) + K/N (macosArm64) RUNTIME KATs and validate-apple.sh.
  # macOS/simulator/device/tvOS/watchOS runtime-vs-compile-faithful split is documented in build-apple.yaml.
  build-apple:
    needs: [grep-gate]
    uses: ./.github/workflows/build-apple.yaml

  build-android:
    needs: [grep-gate]
    # REAL: NDK cross-compile arm64-v8a + x86_64 static .a + whole-archive Bionic-24 link-smoke. The
    # prefab AAR packaging (:boringssl-android) consumes these archives in a follow-up step.
    uses: ./.github/workflows/build-android.yaml

  # Binary-shaped validation of the built Linux bundles (RFC §8). Runs per-triple on the NATIVE-arch
  # runner (mirrors build-linux) so the FFM SymbolLookup smoke exercises each .so on its own arch —
  # you can't run a linuxArm64 .so on an x64 JVM. The static guards (checksums, headers, nm single-
  # copy) are arch-independent but run here too, close to the artifact. Depends ONLY on build-linux;
  # the apple + android lanes self-validate inline (build-apple runs validate-apple.sh + the FFM/K/N
  # runtime KATs on the macOS runners; build-android runs validate-aar.sh + the emulator/qemu KATs).
  validate-artifacts:
    name: "validate-artifacts (${{ matrix.triple }})"
    needs: [build-linux]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linuxX64
            runner: ubuntu-24.04
          - triple: linuxArm64
            runner: ubuntu-24.04-arm # native ARM64 — runs the arm64 .so under an arm64 JVM
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Download ${{ matrix.triple }} bundle
        uses: actions/download-artifact@v4
        with:
          name: boringssl-${{ matrix.triple }}
          path: dist

      # ── Static binary guards: checksums, extract, headers, nm single-copy / un-mangled (D3) ──
      #    Each triple validates on its own native-arch runner, so the stock `nm` reads its archives.
      - name: "Binary-shaped guards (${{ matrix.triple }})"
        run: bash boringssl-build/scripts/validate-artifacts.sh "${{ matrix.triple }}" dist

      # ── FFM SymbolLookup RUNTIME smoke: stage the downloaded .so and run the real link-smoke test.
      #    This is the RFC §8 "FFM SymbolLookup resolves on JVM" check, against the RELEASED .so on the
      #    native arch (jvm21Test loads META-INF/native/<os>-<arch>/libboringsslffi.so via System.load).
      - name: "FFM SymbolLookup link-smoke (${{ matrix.triple }})"
        run: |
          mkdir -p "boringssl-build/libs/boringssl/${{ matrix.triple }}/lib"
          cp dist/libboringsslffi-*-${{ matrix.triple }}.so \
             "boringssl-build/libs/boringssl/${{ matrix.triple }}/lib/libboringsslffi.so"
          ./gradlew :boringssl-jvm:jvm21Test --rerun-tasks --stacktrace

  # ── D8 COEXISTENCE gate (RFC §12 D8) — armed ONLY while the catalog flag boringsslPrefix="true". ──
  # The standing promotion of the spikes/d8-alias-shim proof onto the REAL released bundles: links the
  # canonical UNPREFIXED linuxX64 tarball AND the content-addressed b<hash8> PREFIXED variant into ONE
  # ELF binary, nm-asserts EXACTLY ONE unprefixed SHA256_Init (D8 lifts D3 to "one copy per distinct
  # commit" — it never breaks the single-unprefixed-copy invariant), and runs the SHA-256("abc") KAT
  # through BOTH copies. While the flag is "false" the build lanes produce no variant tarball and this
  # job is skipped — PR CI is unchanged until the flag flips.
  coexistence-gate:
    name: "D8 coexistence gate (linuxX64)"
    needs: [grep-gate, build-linux]
    if: needs.grep-gate.outputs.prefix_enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download linuxX64 bundle (canonical + b<hash8> variant)
        uses: actions/download-artifact@v4
        with:
          name: boringssl-linuxX64
          path: dist

      - name: "Coexistence: canonical + variant in ONE binary (nm single-copy + KATs through both)"
        run: bash boringssl-build/scripts/validate-coexistence.sh linuxX64 dist
