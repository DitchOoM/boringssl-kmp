# ─────────────────────────────────────────────────────────────────────────────────────────────────
# PR pipeline (RFC §8) — PLACEHOLDER / STUB. Migration step 1 only wires the shape; the real jobs
# (cross-compile + binary-shaped validation) land in step 2/3.
#
# Intended shape (RFC §8):
#   grep-gate (binary-repo standing directives, CI-enforced):
#       - no committed binaries (*.a/*.so/*.dylib/tarballs)
#       - exactly ONE `boringssl` 40-hex commit literal in the tree (the single-pin directive)
#       - no `BORINGSSL_PREFIX` unless catalog-flagged (one-unprefixed-copy invariant)
#     → build-linux  +  build-apple  +  build-android      (per-triple cmake, the RFC §7 matrix)
#     → validate-artifacts  (binary-shaped, RFC §8: tarball extracts; required headers present;
#         nm/llvm-nm shows required symbols UNPREFIXED and exactly one libcrypto; a throwaway
#         wrapper-.def compile+link per K/N triple; FFM SymbolLookup resolves on JVM; AAR prefab
#         metadata well-formed; a quiche ffi,qlog link-smoke against the linux tarball; per-ABI size
#         recorded vs the §5 ≤2.5 MB budget)
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Review (Build & Validate)"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grep-gate:
    name: "Standing directives (grep-gate)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # STUB: step 2/3 implements the real greps. Enumerated here so the gate exists from day one.
      - name: "STUB — binary-repo directive greps (RFC §8)"
        run: |
          echo "TODO step 2/3: enforce the RFC §8 binary-repo directives:"
          echo "  - no committed binaries (*.a/*.so/*.dylib/tarballs)"
          echo "  - exactly ONE boringssl 40-hex commit literal in the tree"
          echo "  - no BORINGSSL_PREFIX unless catalog-flagged"

  build-linux:
    name: "build-linux (STUB)"
    needs: [grep-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "STUB — per-triple cmake (linuxX64, linuxArm64)"
        run: echo "TODO step 2: :boringssl-build cross-compile + package the Linux triples."

  build-apple:
    name: "build-apple (STUB)"
    needs: [grep-gate]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: "STUB — per-SDK cmake (macos/ios/tvos/watchos)"
        run: echo "TODO step 7: Apple triples (tvOS/watchOS behind the spike)."

  build-android:
    name: "build-android (STUB)"
    needs: [grep-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "STUB — NDK cmake (arm64-v8a, x86_64 only; RFC §5 Rule D)"
        run: echo "TODO step 7: Android prefab AAR triples."

  validate-artifacts:
    name: "validate-artifacts (STUB)"
    needs: [build-linux, build-apple, build-android]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "STUB — binary-shaped validation (RFC §8)"
        run: echo "TODO step 3: nm single-copy guard, wrapper-.def link, FFM SymbolLookup, quiche link-smoke, per-ABI size."
