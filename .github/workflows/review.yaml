# ─────────────────────────────────────────────────────────────────────────────────────────────────
# PR pipeline (RFC §8) — PLACEHOLDER / STUB. Migration step 1 only wires the shape; the real jobs
# (cross-compile + binary-shaped validation) land in step 2/3.
#
# Intended shape (RFC §8):
#   grep-gate (binary-repo standing directives, CI-enforced):
#       - no committed binaries (*.a/*.so/*.dylib/tarballs)
#       - exactly ONE `boringssl` 40-hex commit literal in the tree (the single-pin directive)
#       - no `BORINGSSL_PREFIX` unless catalog-flagged (one-unprefixed-copy invariant)
#     → build-linux  +  build-apple  +  build-android      (per-triple cmake, the RFC §7 matrix)
#     → validate-artifacts  (binary-shaped, RFC §8: tarball extracts; required headers present;
#         nm/llvm-nm shows required symbols UNPREFIXED and exactly one libcrypto; a throwaway
#         wrapper-.def compile+link per K/N triple; FFM SymbolLookup resolves on JVM; AAR prefab
#         metadata well-formed; a quiche ffi,qlog link-smoke against the linux tarball; per-ABI size
#         recorded vs the §5 ≤2.5 MB budget)
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Review (Build & Validate)"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grep-gate:
    name: "Standing directives (grep-gate)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # Binary-repo standing directives (RFC §8), CI-enforced.
      - name: "No committed native binaries"
        run: |
          if git ls-files | grep -E '\.(a|so|dylib|dll)$|\.tar\.gz$' ; then
            echo "::error::committed native binaries found — they must be gitignored and built in CI"
            exit 1
          fi
      - name: "Exactly ONE BoringSSL commit literal (single-pin)"
        run: |
          n=$(git grep -hoE '[0-9a-f]{40}' -- gradle/libs.versions.toml | sort -u | wc -l)
          if [ "$n" -ne 1 ]; then
            echo "::error::expected exactly one 40-hex boringssl commit in the catalog, found $n"
            exit 1
          fi
      - name: "No BORINGSSL_PREFIX unless catalog-flagged (one-unprefixed-copy invariant)"
        run: |
          if git grep -nE 'BORINGSSL_PREFIX' -- ':!*.md' ':!.github/**' && ! grep -q 'boringsslPrefix' gradle/libs.versions.toml ; then
            echo "::error::BORINGSSL_PREFIX used without the catalog flag"
            exit 1
          fi

  # Real reusable lane — native-runner matrix, manylinux2014 container, glibc-floor gate, caching.
  build-linux:
    needs: [grep-gate]
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    name: "build-apple (STUB — step 7)"
    needs: [grep-gate]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: "Apple triples placeholder"
        run: |
          echo "TODO step 7 — macos/ios triples; tvOS/watchOS behind the spike (RFC D4)."

  build-android:
    name: "build-android (STUB — step 7)"
    needs: [grep-gate]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "Android prefab placeholder"
        run: |
          echo "TODO step 7 — NDK prefab AAR (arm64-v8a, x86_64 only; RFC §5 Rule D)."

  validate-artifacts:
    name: "validate-artifacts (STUB — step 3)"
    needs: [build-linux, build-apple, build-android]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "Binary-shaped validation placeholder"
        run: |
          echo "TODO step 3 — nm single-copy guard, wrapper-.def link, FFM SymbolLookup, quiche link-smoke, per-ABI size."
