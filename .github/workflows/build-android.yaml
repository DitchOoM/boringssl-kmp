# ─────────────────────────────────────────────────────────────────────────────────────────────────
# Build & link-smoke the Android per-ABI BoringSSL static archives (RFC §5/§7).
#
# Unlike Linux, Android cross-compiles with the NDK (Bionic, not glibc), so BOTH ABIs build on a single
# x86_64 runner — no native-arm runner, no manylinux container, no qemu. ANDROID_PLATFORM=android-24
# (RFC §5 Rule D / D7) is the floor; the NDK toolchain is the portability control. ABIs: arm64-v8a +
# x86_64 only (armeabi-v7a dropped, Rule D).
#
# STABLE CACHING — the built archives are content-addressed on the PINNED inputs (BoringSSL commit +
# API + NDK version): a hit turns the ~from-source build into a no-op (the task marker's `onlyIf`
# short-circuits). BoringSSL source clone is keyed on the commit.
#
# The .a produced here are the input to :boringssl-android's prefab AAR (next step); this lane proves
# they cross-compile and whole-archive-link against Bionic-24 (`:boringssl-build:checkBoringSslAndroid`).
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Build & Smoke (Android)"

on:
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  # Canonical NDK. Kept in step with the locally-verified toolchain; an NDK bump is recorded in each
  # archive's build marker + provenance (RFC §11).
  NDK_VERSION: "28.2.13676358"

jobs:
  build:
    name: "BoringSSL Android (arm64-v8a + x86_64, NDK)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK + pinned NDK
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml') }}

      # Restore both ABIs' built archives; a hit turns the from-source cross-compile into a no-op.
      - name: Cache built Android archives
        uses: actions/cache@v4
        with:
          path: boringssl-build/libs/boringssl/android
          key: bssl-android-${{ hashFiles('gradle/libs.versions.toml') }}-ndk${{ env.NDK_VERSION }}

      - name: Build + link-smoke + budget + assemble prefab AAR
        # prefabAar transitively runs :boringssl-build:checkBoringSslAndroid (cross-compile both ABIs +
        # whole-archive Bionic-24 link-smoke + §5 ≤2.5 MiB/ABI budget gate), then zips the prefab AAR.
        run: ./gradlew :boringssl-android:prefabAar --stacktrace

      - name: Upload prefab AAR
        uses: actions/upload-artifact@v4
        with:
          name: boringssl-android-aar
          path: boringssl-android/build/outputs/aar/boringssl-android-*.aar
          if-no-files-found: error
          retention-days: 7
