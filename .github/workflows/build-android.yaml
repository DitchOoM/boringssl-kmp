# ─────────────────────────────────────────────────────────────────────────────────────────────────
# Build & link-smoke the Android per-ABI BoringSSL static archives (RFC §5/§7).
#
# Unlike Linux, Android cross-compiles with the NDK (Bionic, not glibc), so BOTH ABIs build on a single
# x86_64 runner — no native-arm runner, no manylinux container, no qemu. ANDROID_PLATFORM=android-24
# (RFC §5 Rule D / D7) is the floor; the NDK toolchain is the portability control. ABIs: arm64-v8a +
# x86_64 only (armeabi-v7a dropped, Rule D).
#
# STABLE CACHING — the built archives are content-addressed on the PINNED inputs (BoringSSL commit +
# API + NDK version): a hit turns the ~from-source build into a no-op (the task marker's `onlyIf`
# short-circuits). BoringSSL source clone is keyed on the commit.
#
# The .a produced here are the input to :boringssl-android's prefab AAR (next step); this lane proves
# they cross-compile and whole-archive-link against Bionic-24 (`:boringssl-build:checkBoringSslAndroid`).
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Build & Smoke (Android)"

on:
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  # Canonical NDK. Kept in step with the locally-verified toolchain; an NDK bump is recorded in each
  # archive's build marker + provenance (RFC §11).
  NDK_VERSION: "28.2.13676358"

jobs:
  build:
    name: "BoringSSL Android (arm64-v8a + x86_64, NDK)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK + pinned NDK
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}

      # Restore both ABIs' built archives; a hit turns the from-source cross-compile into a no-op.
      - name: Cache built Android archives
        uses: actions/cache@v4
        with:
          path: boringssl-build/libs/boringssl/android
          key: bssl-android-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}-ndk${{ env.NDK_VERSION }}

      - name: Build + link-smoke + budget + assemble prefab AAR
        # prefabAar transitively runs :boringssl-build:checkBoringSslAndroid (cross-compile both ABIs +
        # whole-archive Bionic-24 link-smoke + §5 ≤2.5 MiB/ABI budget gate), then zips the prefab AAR.
        run: ./gradlew :boringssl-android:prefabAar --stacktrace

      - name: Validate prefab AAR (structure + prefab JSON + consumer link)
        # The Android analog of validate-artifacts.sh: extracts the SHIPPED AAR, checks the prefab
        # schema, and NDK-links a consumer against its extracted payload for both ABIs.
        run: |
          AAR="$(ls boringssl-android/build/outputs/aar/boringssl-android-*.aar)"
          bash boringssl-build/scripts/validate-aar.sh "$AAR" "$ANDROID_NDK_HOME"

      - name: Upload prefab AAR
        uses: actions/upload-artifact@v4
        with:
          name: boringssl-android-aar
          path: boringssl-android/build/outputs/aar/boringssl-android-*.aar
          if-no-files-found: error
          retention-days: 7

  # ── Runtime parity check (x86_64): RUN the crypto on a real Android x86_64 emulator (Bionic) ──────
  # The Android analog of :boringssl-jvm:jvm21Test — it EXECUTES the archives on-arch and asserts the
  # published KAT vectors, not just that they link. x86_64 gets the full Bionic dynamic runtime via a
  # KVM-accelerated emulator; arm64-v8a runtime is covered by the qemu-kat-arm64 job below.
  emulator-kat:
    name: "Android runtime KAT (x86_64 emulator)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK + pinned NDK
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}

      - name: Cache built Android archives
        uses: actions/cache@v4
        with:
          path: boringssl-build/libs/boringssl/android
          key: bssl-android-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}-ndk${{ env.NDK_VERSION }}

      - name: Build the x86_64 KAT executable
        run: ./gradlew :boringssl-build:buildAndroidKatX8664 --stacktrace

      - name: Run KAT on Android x86_64 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: aosp_atd # lightweight headless image
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          script: |
            adb push boringssl-build/build/boringssl/android-kat/x86_64/boringssl_kat /data/local/tmp/boringssl_kat
            adb shell chmod 755 /data/local/tmp/boringssl_kat
            adb shell "/data/local/tmp/boringssl_kat; echo KAT_EXIT=\$?" | tee kat.out
            grep -q "KAT_EXIT=0" kat.out || { echo "::error::Android KAT failed on x86_64 emulator"; exit 1; }

  # ── Runtime parity check (arm64-v8a): RUN the arm64 crypto under qemu-aarch64 ─────────────────────
  # Executes the aarch64 archives (incl. BoringSSL's arm64 asm paths) on the normal x86_64 runner — no
  # arm64 runner, no KVM, no Android emulator. The KAT is built STATIC (buildAndroidKatArm64V8a) so
  # qemu-user can run it without an Android dynamic loader. This covers arm64 crypto-correctness; the
  # full Bionic dynamic-runtime-on-arm64 (native arm64 emulator) is a possible future upgrade.
  qemu-kat-arm64:
    name: "Android runtime KAT (arm64-v8a / qemu)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK + pinned NDK
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install qemu-user-static
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}

      - name: Cache built Android archives
        uses: actions/cache@v4
        with:
          path: boringssl-build/libs/boringssl/android
          key: bssl-android-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}-ndk${{ env.NDK_VERSION }}

      - name: Build the arm64-v8a KAT executable (static)
        run: ./gradlew :boringssl-build:buildAndroidKatArm64V8a --stacktrace

      - name: Run arm64-v8a KAT under qemu-aarch64
        run: |
          qemu-aarch64-static boringssl-build/build/boringssl/android-kat/arm64-v8a/boringssl_kat \
            | tee kat.out
          grep -q "all vectors OK" kat.out || { echo "::error::Android arm64-v8a KAT failed under qemu"; exit 1; }
