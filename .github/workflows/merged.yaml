# ─────────────────────────────────────────────────────────────────────────────────────────────────
# Release pipeline (RFC §8 / §10 step 3) — label-driven, on push to main.
#
#   plan            derive version + flow from the merged PR's labels:
#                     • skip-release   → skip (no build, no publish)
#                     • draft-release  → build + DEPLOY to Central staging (USER_MANAGED) + DRAFT Release
#                     • (default)      → build + publish to Central (AUTOMATIC) + tag + Release
#                     • major / minor  → -PincrementMajor / -PincrementMinor (else patch)
#                   short-circuits if a Release for the computed tag already exists.
#     ├─ build-linux / build-apple / build-android   (reusable lanes; tarballs stamped -PboringsslBundleVersion)
#     ├─ stage-central   assemble every publishable artifact (jvm MRJAR w/ all platforms' native libs,
#     │                  android prefab AAR, bom, provision + baked checksums) into an UNSIGNED local
#     │                  maven repo → `maven-local-merged`.
#     ├─ publish         → publish-to-central.yaml: GPG-sign + curl-upload the bundle to the Central Portal
#     │                    (USER_MANAGED for draft, AUTOMATIC for release). Uses the shared org secrets.
#     └─ finalize        heavy static tarballs (+ SHA256SUMS + provenance) → GitHub Release (RFC §3
#                        channel split) + tag; notes state the canonical commit + quiche ABI anchor.
#
# Signing is done in publish-to-central.yaml with the org GPG key — the Gradle modules publish UNSIGNED
# to the local repo, exactly like the sibling DitchOoM repos.
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Merged (Release)"
on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:
    inputs:
      increment:
        description: "Version segment to bump"
        type: choice
        options: [patch, minor, major]
        default: patch
      flow:
        description: "Release flow"
        type: choice
        options: [release, draft, skip]
        default: release

concurrency:
  group: merged-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Derive the version + flow from the merged PR's labels (or the dispatch inputs) ──
  plan:
    name: "Plan release (labels → version + flow)"
    runs-on: ubuntu-24.04
    outputs:
      flow: ${{ steps.decide.outputs.flow }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve flow + increment from PR labels
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            flow="${{ github.event.inputs.flow }}"
            case "${{ github.event.inputs.increment }}" in
              major) major=true; minor=false ;;
              minor) major=false; minor=true ;;
              *)     major=false; minor=false ;;
            esac
          else
            labels="$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].labels[].name' 2>/dev/null | tr '\n' ' ' || true)"
            echo "labels: [$labels]"
            has() { echo " $labels " | grep -q " $1 "; }
            major=false; minor=false; flow=release
            has major && major=true
            has minor && minor=true
            has draft-release && flow=draft
            has skip-release  && flow=skip
          fi
          echo "flow=$flow"; echo "major=$major"; echo "minor=$minor"
          { echo "flow=$flow"; echo "major=$major"; echo "minor=$minor"; } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.decide.outputs.flow != 'skip'
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Setup Gradle
        if: steps.decide.outputs.flow != 'skip'
        uses: gradle/actions/setup-gradle@v6

      - name: Compute version + short-circuit if already released
        id: version
        if: steps.decide.outputs.flow != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FLAGS=""
          [ "${{ steps.decide.outputs.major }}" = "true" ] && FLAGS="$FLAGS -PincrementMajor=true"
          [ "${{ steps.decide.outputs.minor }}" = "true" ] && FLAGS="$FLAGS -PincrementMinor=true"
          V="$(./gradlew :boringssl-jvm:printVersion -q $FLAGS | tail -1 | tr -d '[:space:]')"
          echo "computed version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          if gh release view "v$V" >/dev/null 2>&1; then
            echo "::notice::Release v$V already exists — nothing to do."
            echo "flow=skip" >> "$GITHUB_OUTPUT"  # informational; downstream gates read plan.flow below
          fi

  # ── Build + validate the tarballs / shared libs / AAR, stamped with the release version ──
  build-linux:
    needs: plan
    if: needs.plan.outputs.flow != 'skip'
    uses: ./.github/workflows/build-linux.yaml
    with:
      bundle_version: ${{ needs.plan.outputs.version }}

  build-apple:
    needs: plan
    if: needs.plan.outputs.flow != 'skip'
    uses: ./.github/workflows/build-apple.yaml
    with:
      bundle_version: ${{ needs.plan.outputs.version }}

  build-android:
    needs: plan
    if: needs.plan.outputs.flow != 'skip'
    uses: ./.github/workflows/build-android.yaml

  # ── Assemble every publishable artifact into an UNSIGNED local maven repo (maven-local-merged) ──
  stage-central:
    name: "Stage maven-local bundle"
    needs: [plan, build-linux, build-apple, build-android]
    if: needs.plan.outputs.flow == 'release' || needs.plan.outputs.flow == 'draft'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      NDK_VERSION: "28.2.13676358"
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6
      - name: Set up Android SDK + pinned NDK (for the prefab AAR)
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Download all bundle artifacts (tarballs + FFM shared libs)
        uses: actions/download-artifact@v4
        with:
          pattern: "boringssl-*"
          merge-multiple: true
          path: dist

      - name: Restore built BoringSSL archives (source clone + android .a for the AAR)
        uses: actions/cache@v4
        with:
          path: |
            boringssl-build/build/boringssl/src
            boringssl-build/libs/boringssl/android
          key: bssl-publish-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            bssl-android-

      - name: Stage FFM shared libs into the MRJAR layout + assemble SHA256SUMS
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in dist/libboringsslffi-*-*.so dist/libboringsslffi-*-*.dylib; do
            base="$(basename "$f")"; ext="${base##*.}"
            triple="$(echo "$base" | sed -E "s/^libboringsslffi-.*-([A-Za-z0-9]+)\.$ext$/\1/")"
            mkdir -p "boringssl-build/libs/boringssl/$triple/lib"
            cp "$f" "boringssl-build/libs/boringssl/$triple/lib/libboringsslffi.$ext"
            echo "staged $triple/libboringsslffi.$ext"
          done
          ( cd dist && sha256sum boringssl-*.tar.gz | sort -k2 > SHA256SUMS && cat SHA256SUMS )

      - name: Publish all modules to the local maven repo (UNSIGNED)
        env:
          V: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          # Bake the released tarball digests into the provision plugin (no TOFU), then build the jvm
          # native klibs (the multiplatform convention publishes them alongside the MRJAR).
          ./gradlew :boringssl-provision:bakeChecksums -Pversion="$V" -PchecksumsFile="$PWD/dist/SHA256SUMS" --stacktrace
          ./gradlew :boringssl-jvm:assemble -Pversion="$V" --stacktrace
          ./gradlew \
            :boringssl-bom:publishToMavenLocal \
            :boringssl-jvm:publishToMavenLocal \
            :boringssl-android:publishToMavenLocal \
            :boringssl-provision:publishToMavenLocal \
            -Pversion="$V" --no-configuration-cache --stacktrace

      - name: Collect the boringssl subtree into a bundle layout
        run: |
          set -euo pipefail
          mkdir -p staging/com/ditchoom
          cp -r "$HOME/.m2/repository/com/ditchoom/boringssl" staging/com/ditchoom/
          find staging -type f | sort

      - name: Upload maven-local-merged
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-merged
          path: staging
          if-no-files-found: error
          retention-days: 3

  # ── Sign + upload the bundle to the Central Portal (shared DitchOoM transport) ──
  publish:
    needs: [plan, stage-central]
    if: needs.plan.outputs.flow == 'release' || needs.plan.outputs.flow == 'draft'
    uses: ./.github/workflows/publish-to-central.yaml
    with:
      # draft → staging only (USER_MANAGED); release → auto-release (AUTOMATIC).
      publishing-type: ${{ needs.plan.outputs.flow == 'draft' && 'USER_MANAGED' || 'AUTOMATIC' }}
      version: ${{ needs.plan.outputs.version }}
    secrets:
      GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

  # ── Heavy static tarballs → GitHub Release (RFC §3 channel split) + tag ──
  finalize:
    name: "GitHub Release (tarballs) + tag"
    needs: [plan, build-linux, build-apple, build-android, publish]
    if: |
      (needs.plan.outputs.flow == 'release' || needs.plan.outputs.flow == 'draft') &&
      needs.publish.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the tag + GitHub Release
    steps:
      - uses: actions/checkout@v6

      - name: Download tarball artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "boringssl-*"
          merge-multiple: true
          path: dist

      - name: Assemble SHA256SUMS + read canonical anchor
        id: anchor
        run: |
          set -euo pipefail
          ( cd dist && sha256sum boringssl-*.tar.gz | sort -k2 > SHA256SUMS && cat SHA256SUMS )
          echo "commit=$(grep -E '^boringssl = ' gradle/libs.versions.toml | grep -oE '[0-9a-f]{40}')" >> "$GITHUB_OUTPUT"
          echo "quiche=$(grep -E '^boringsslQuicheAbi = ' gradle/libs.versions.toml | cut -d'\"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Create tag (release flow only)
        if: needs.plan.outputs.flow == 'release'
        env:
          V: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "v$V" >/dev/null 2>&1; then echo "tag v$V exists"; exit 0; fi
          git tag "v$V"
          git push origin "v$V"

      - name: Create GitHub Release v${{ needs.plan.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.plan.outputs.version }}
          FLOW: ${{ needs.plan.outputs.flow }}
          COMMIT: ${{ steps.anchor.outputs.commit }}
          QUICHE: ${{ steps.anchor.outputs.quiche }}
          DEPLOYMENT_ID: ${{ needs.publish.outputs.deployment-id }}
        run: |
          set -euo pipefail
          if [ "$FLOW" = "draft" ]; then
            tail="**Status:** awaiting validation in [Maven Central staging](https://central.sonatype.com/publishing/deployments) (deployment \`$DEPLOYMENT_ID\`)."
          else
            tail="**Maven Central:** https://central.sonatype.com/artifact/com.ditchoom.boringssl/boringssl-jvm/$V"
          fi
          notes="$(cat <<EOF
          Canonical BoringSSL commit: \`$COMMIT\`
          ABI anchor: **$QUICHE**

          Per-triple static bundles (\`headers + libcrypto.a + libssl.a\`) for Kotlin/Native cinterop,
          resolved by the \`com.ditchoom.boringssl.provision\` plugin (checksums baked in). The JVM FFM
          shared libraries ship in the \`boringssl-jvm\` MRJAR; the Android static \`.a\` in the
          \`boringssl-android\` prefab AAR — both on Maven Central.

          $tail
          EOF
          )"
          args=(--title "v$V" --notes "$notes")
          [ "$FLOW" = "draft" ] && args+=(--draft)
          if gh release view "v$V" >/dev/null 2>&1; then
            gh release upload "v$V" dist/boringssl-*.tar.gz dist/boringssl-*.tar.gz.sha256 \
              dist/boringssl-*.provenance.json dist/SHA256SUMS --clobber
          else
            gh release create "v$V" "${args[@]}" \
              dist/boringssl-*.tar.gz dist/boringssl-*.tar.gz.sha256 \
              dist/boringssl-*.provenance.json dist/SHA256SUMS
          fi
