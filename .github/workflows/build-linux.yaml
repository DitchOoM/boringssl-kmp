# ─────────────────────────────────────────────────────────────────────────────────────────────────
# Build & package the canonical Linux BoringSSL bundles (RFC §7/§8/§8a).
#
# Reusable lane. Each triple builds on its OWN native-arch runner (GitHub's free public ARM64 runners),
# inside the manylinux2014 (glibc 2.17) container — so every archive is Kotlin/Native-floor-safe
# (`__xstat` not `stat`@2.33, no `__isoc23`@2.38), and NO qemu / buildx is needed: each runner builds
# its native-arch image with the legacy builder (:boringssl-build's ensureImage picks legacy for the
# native arch automatically). Native arm64 is also far faster than emulation.
#
# STABLE CACHING — every expensive step is content-addressed on the PINNED inputs (BoringSSL commit +
# container recipe), never on time/run:
#   • built archives (boringssl-build/libs) keyed on triple+commit+recipe → a hit skips the ~10-min
#     from-source build (the build task's marker `onlyIf` short-circuits).
#   • BoringSSL source clone keyed on commit.   • ~/.konan keyed on the catalog.   • Gradle build cache.
# The manylinux image is layer-cached in the local docker store per runner (recipe-hashed tag).
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Build & Package (Linux)"

on:
  workflow_call: {}
  workflow_dispatch: {}

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "BoringSSL ${{ matrix.triple }} (manylinux2014, native)"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linuxX64
            arch: amd64
            runner: ubuntu-24.04
            task: packageBoringSslLinuxX64
          - triple: linuxArm64
            arch: arm64
            runner: ubuntu-24.04-arm # native ARM64 — no qemu, legacy-builder native image
            task: packageBoringSslLinuxArm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      # ── Stable caches, keyed on the PINNED commit (+ recipe for the built archives) ──
      - name: Cache Kotlin/Native (floor sysroot + prebuilts)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ matrix.arch }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ matrix.arch }}-

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml') }}

      # THE big one: restore this triple's built archives; a hit turns the from-source build into a no-op.
      - name: Cache built BoringSSL archives (${{ matrix.triple }})
        uses: actions/cache@v4
        with:
          path: boringssl-build/libs/boringssl/${{ matrix.triple }}
          key: bssl-libs-${{ matrix.triple }}-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/docker/Dockerfile', 'boringssl-build/docker/build-boringssl.sh', 'boringssl-build/docker/boringssl_shim.h', 'boringssl-build/docker/boringssl_shim.c', 'boringssl-build/docker/boringssl_ffi_exports.map') }}

      - name: Build + floor-gate + package (${{ matrix.triple }})
        run: ./gradlew :boringssl-build:${{ matrix.task }} --stacktrace

      - name: Upload ${{ matrix.triple }} bundle
        uses: actions/upload-artifact@v4
        with:
          name: boringssl-${{ matrix.triple }}
          # The K/N tarball (+ checksum + provenance) AND the FFM shared library (+ checksum). The .so
          # is a separate artifact — it ships in the boringssl-jvm MRJAR, not the K/N bundle — but it
          # rides in the same upload so validate-artifacts fetches everything for this triple at once.
          path: |
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.tar.gz
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.tar.gz.sha256
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.provenance.json
            boringssl-build/build/dist/libboringsslffi-*-${{ matrix.triple }}.so
            boringssl-build/build/dist/libboringsslffi-*-${{ matrix.triple }}.so.sha256
          if-no-files-found: error
          retention-days: 7

  # Combine per-triple checksums into one SHA256SUMS (the per-triple jobs each see only their own).
  checksums:
    name: "Aggregate SHA256SUMS"
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: boringssl-linux*
          merge-multiple: true
          path: dist
      - name: Write SHA256SUMS
        run: |
          cd dist
          sha256sum boringssl-*.tar.gz | sort -k2 > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: boringssl-linux-SHA256SUMS
          path: dist/SHA256SUMS
          if-no-files-found: error
