# ─────────────────────────────────────────────────────────────────────────────────────────────────
# Build & package the canonical Linux BoringSSL bundles (RFC §7/§8/§8a).
#
# Reusable lane. Each triple builds on its OWN native-arch runner (GitHub's free public ARM64 runners),
# inside the manylinux2014 (glibc 2.17) container — so every archive is Kotlin/Native-floor-safe
# (`__xstat` not `stat`@2.33, no `__isoc23`@2.38), and NO qemu / buildx is needed: each runner builds
# its native-arch image with the legacy builder (:boringssl-build's ensureImage picks legacy for the
# native arch automatically). Native arm64 is also far faster than emulation.
#
# STABLE CACHING — every expensive step is content-addressed on the PINNED inputs (BoringSSL commit +
# container recipe), never on time/run:
#   • built archives (boringssl-build/libs) keyed on triple+commit+recipe → a hit skips the ~10-min
#     from-source build (the build task's marker `onlyIf` short-circuits).
#   • BoringSSL source clone keyed on commit.   • ~/.konan keyed on the catalog.   • Gradle build cache.
# The manylinux image is layer-cached in the local docker store per runner (recipe-hashed tag).
# ─────────────────────────────────────────────────────────────────────────────────────────────────
name: "Build & Package (Linux)"

on:
  workflow_call:
    inputs:
      bundle_version:
        description: "boringsslBundleVersion stamped into the release tarball names (default: the dev tag)."
        required: false
        type: string
        default: ""
  workflow_dispatch: {}

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "BoringSSL ${{ matrix.triple }} (manylinux2014, native)"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linuxX64
            arch: amd64
            runner: ubuntu-24.04
            task: packageBoringSslLinuxX64
          - triple: linuxArm64
            arch: arm64
            runner: ubuntu-24.04-arm # native ARM64 — no qemu, legacy-builder native image
            task: packageBoringSslLinuxArm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Gradle (build cache)
        uses: gradle/actions/setup-gradle@v6

      # ── Stable caches, keyed on the PINNED commit (+ recipe for the built archives) ──
      - name: Cache Kotlin/Native (floor sysroot + prebuilts)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ matrix.arch }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ matrix.arch }}-

      - name: Cache BoringSSL source clone
        uses: actions/cache@v4
        with:
          path: boringssl-build/build/boringssl/src
          key: bssl-src-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/patches/**') }}

      # THE big one: restore this triple's built archives; a hit turns the from-source build into a no-op.
      # The `-*` glob also carries the D8 `-b<hash8>` variant dir (empty until boringsslPrefix="true").
      - name: Cache built BoringSSL archives (${{ matrix.triple }})
        uses: actions/cache@v4
        with:
          path: |
            boringssl-build/libs/boringssl/${{ matrix.triple }}
            boringssl-build/libs/boringssl/${{ matrix.triple }}-*
          key: bssl-libs-${{ matrix.triple }}-${{ hashFiles('gradle/libs.versions.toml', 'boringssl-build/docker/Dockerfile', 'boringssl-build/docker/build-archives.sh', 'boringssl-build/docker/link-ffi.sh', 'boringssl-build/docker/boringssl_shim.h', 'boringssl-build/docker/boringssl_shim.c', 'boringssl-build/docker/boringssl_ffi_exports.map', 'boringssl-build/scripts/build-prefixed-variant.sh', 'boringssl-build/patches/**') }}

      - name: Build + floor-gate + package (${{ matrix.triple }})
        run: |
          ARGS=""
          [ -n "${{ inputs.bundle_version }}" ] && ARGS="-PboringsslBundleVersion=${{ inputs.bundle_version }}"
          ./gradlew :boringssl-build:${{ matrix.task }} $ARGS --stacktrace

      # ── Bindings-free ingredient owner (RFC §12 D10): build + publish-smoke :boringssl-canonical to
      #    mavenLocal — proves the owner PUBLISHES cleanly and emits its embedded-archive `-cinterop`
      #    klib via Gradle Module Metadata (the archive rides the `.module`, NOT the POM). The owner
      #    ships ONLY the ONE canonical archive (embedArchive=true), an EMPTY bindings-free interop
      #    surface — "ship the ingredients, not the bindings". It embeds the SAME container-built archive
      #    just packaged above (provision localDist ← build/dist), so nothing new is committed.
      #    The co-link check below consumes the owner as an in-build `project(":boringssl-canonical")`
      #    dependency (NOT this mavenLocal publish), so this step stands on its own as a publish smoke.
      #    Publish ONLY the linuxX64 target publication. NOT the root `kotlinMultiplatform` publication
      #    (nor the aggregate `publishToMavenLocal`): its metadata (commonizeCInterop → allMetadataJar)
      #    transitively needs the linuxArm64 cinterop klib → generateCanonicalDefLinuxArm64 →
      #    :boringssl-build:buildBoringSslArchivesLinuxArm64, i.e. an arm64 BoringSSL docker cross-build.
      #    This runner is a NATIVE amd64 box with NO qemu/buildx (the arm64 leg builds natively on an
      #    arm64 runner precisely so no emulation is ever provisioned), so that cross-build fails hard
      #    (`exec /bin/sh: exec format error`). The linuxX64 target publication alone still emits the
      #    embedded-archive `-cinterop` klib + its GMM `.module` — everything this smoke needs to prove.
      #    The root `kotlinMultiplatform`/metadata publication (which needs BOTH per-triple archives) is
      #    a release-job concern: when merged.yaml wires canonical -> Central it must assemble both the
      #    linuxX64 and linuxArm64 archives first (e.g. a native arm64 build leg, or qemu/buildx) before
      #    publishing the aggregate. It is deliberately out of scope for this per-triple PR smoke.
      - name: "Build + publish-smoke :boringssl-canonical owner (mavenLocal) (${{ matrix.triple }})"
        if: ${{ matrix.triple == 'linuxX64' }}
        run: |
          ARGS=""
          [ -n "${{ inputs.bundle_version }}" ] && ARGS="-PboringsslBundleVersion=${{ inputs.bundle_version }}"
          ./gradlew \
            :boringssl-canonical:publishLinuxX64PublicationToMavenLocal \
            $ARGS --stacktrace

      # ── Testsuite link-smoke + surface-contract KAT batteries + D10 co-link check (Profile 1 + D10
      #    standing gates): statically link the just-built archives into K/N linuxX64 test binaries —
      #    the full-bundle SHA256 smoke (libssl.a + libcrypto.a) AND the libcrypto.a-ALONE cryptoOnly
      #    gate with RFC/NIST KATs over buffer's frozen crypto closure (HMAC, AES-GCM, ChaCha20-Poly1305,
      #    Ed25519, X25519, ECDSA/ECDH P-256, SHA-384/512, RAND) — AND the D10 co-link check: a consumer
      #    depending on the :boringssl-canonical owner (embedArchive=true, in-build project dep) PLUS its
      #    own external cinterops (embedArchive=false) co-links into ONE binary that BUILDS + RUNS,
      #    proving headers-only external surfaces resolve + execute against the co-linked owner archive
      #    (libssl included). The single-copy invariant itself is enforced at ARCHIVE level by
      #    validate-artifacts check 8 (nm over libcrypto.a/libssl.a). Only the x64 leg: K/N has no
      #    linux-aarch64 host target, so the arm64 runner cannot compile or run a K/N test binary.
      - name: "Testsuite link-smoke + KAT batteries + co-link one-copy (${{ matrix.triple }})"
        if: ${{ matrix.triple == 'linuxX64' }}
        run: ./gradlew :boringssl-testsuite:linuxX64Test --stacktrace

      # ── Provision-plugin unit + functional tests: the ProjectBuilder resolve/verify/extract pipeline
      #    (sha-keyed marker busting, checksum mismatch, no-TOFU errors) and the TestKit
      #    `-PboringsslLocalBundle` property seam. Pure-JVM and host-neutral — one run on the x64 leg
      #    keeps the standing gate CI-live without duplicating it on the arm64 runner.
      - name: "Provision-plugin unit + functional tests (${{ matrix.triple }})"
        if: ${{ matrix.triple == 'linuxX64' }}
        run: ./gradlew :boringssl-provision:test --stacktrace

      # ── D8 content-addressed variant (RFC §12 D8): package the b<hash8> PREFIXED variant + its ELF
      #    alias adapter (same manylinux2014 container). The Gradle tasks are `onlyIf { prefixEnabled }`,
      #    so while the catalog flag boringsslPrefix="false" this is a skipped no-op and the lane's
      #    behavior is byte-for-byte unchanged. linuxX64 only (the linuxArm64 variant is a follow-up).
      - name: "Package content-addressed variant (${{ matrix.triple }}; no-op while boringsslPrefix=false)"
        if: ${{ matrix.triple == 'linuxX64' }}
        run: |
          ARGS=""
          [ -n "${{ inputs.bundle_version }}" ] && ARGS="-PboringsslBundleVersion=${{ inputs.bundle_version }}"
          ./gradlew :boringssl-build:packageBoringSslVariantLinuxX64 $ARGS --stacktrace

      # ── One-line consumer resolve (RFC §4 / item 1): publish the provision plugin to mavenLocal and
      #    run samples/cinterop-consumer — a STANDALONE external build that gets K/N BoringSSL via
      #    `boringssl.cinterop(linuxX64())` with NO hand-written .def. Runs natively on the x64 runner so
      #    the container-built (glibc-2.17) archive links against K/N's glibc-2.19 floor and RUNS. Only
      #    linuxX64 (K/N has no linux-aarch64 host target, so the arm64 runner can't run a K/N test).
      - name: "Provision-plugin one-line cinterop consumer resolve (${{ matrix.triple }})"
        if: ${{ matrix.triple == 'linuxX64' }}
        run: |
          BUNDLE_VERSION="${{ inputs.bundle_version != '' && inputs.bundle_version || '0.0.1-dev' }}"
          ./gradlew :boringssl-provision:publishToMavenLocal --stacktrace
          ./gradlew -p samples/cinterop-consumer linuxX64Test \
            -PboringsslPluginVersion=0.0.1-SNAPSHOT \
            -PboringsslBundleVersion="$BUNDLE_VERSION" \
            --stacktrace

      - name: Upload ${{ matrix.triple }} bundle
        uses: actions/upload-artifact@v4
        with:
          name: boringssl-${{ matrix.triple }}
          # The K/N tarball (+ checksum + provenance) AND the FFM shared library (+ checksum). The .so
          # is a separate artifact — it ships in the boringssl-jvm MRJAR, not the K/N bundle — but it
          # rides in the same upload so validate-artifacts fetches everything for this triple at once.
          # The `-b*` globs carry the D8 content-addressed variant when boringsslPrefix="true"; while
          # the flag is "false" they match nothing, which is fine — `if-no-files-found: error` only
          # fires when NO path matches at all, and the canonical tarball always does.
          path: |
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.tar.gz
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.tar.gz.sha256
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}.provenance.json
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}-b*.tar.gz
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}-b*.tar.gz.sha256
            boringssl-build/build/dist/boringssl-*-${{ matrix.triple }}-b*.provenance.json
            boringssl-build/build/dist/libboringsslffi-*-${{ matrix.triple }}.so
            boringssl-build/build/dist/libboringsslffi-*-${{ matrix.triple }}.so.sha256
          if-no-files-found: error
          retention-days: 7

  # Combine per-triple checksums into one SHA256SUMS (the per-triple jobs each see only their own).
  checksums:
    name: "Aggregate SHA256SUMS"
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: boringssl-linux*
          merge-multiple: true
          path: dist
      - name: Write SHA256SUMS
        run: |
          cd dist
          sha256sum boringssl-*.tar.gz | sort -k2 > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: boringssl-linux-SHA256SUMS
          path: dist/SHA256SUMS
          if-no-files-found: error
